<div class="admin-layout">
  <!-- Dynamic Background Lights -->
  <div class="admin-bg-lights">
    <div class="light-orb orb-1"></div>
    <div class="light-orb orb-2"></div>
  </div>

  <!-- Sidebar -->
  <aside class="admin-sidebar glass">
    <div class="sidebar-header">
      <h2 class="logo-text">Realmyfit <span class="text-primary">Admin</span></h2>
    </div>
    
    <nav class="sidebar-nav">
      <a *ngFor="let item of menuItems" 
         [routerLink]="item.route" 
         routerLinkActive="active" 
         class="nav-item">
        <span class="nav-icon" [innerHTML]="item.svg"></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout glass" routerLink="/">Volver al Sitio</button>
    </div>
  </aside>

  <!-- Main Content area -->
  <main class="admin-main">
    <header class="admin-top-bar glass">
      <h1 class="page-title">Panel de Control</h1>
      <div class="user-profile">
        <span class="user-name">Administrador</span>
        <div class="user-avatar glass"></div>
      </div>
    </header>

    <section class="admin-content">
      <!-- Nested views will go here -->
      <div class="view-container">
        <router-outlet></router-outlet>
      </div>
    </section>
  </main>
</div>
